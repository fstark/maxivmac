name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history for git describe

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
          libxi-dev libxinerama-dev libxss-dev \
          libgl-dev libgles-dev libegl-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols \
          libasound2-dev libpulse-dev libpipewire-0.3-dev \
          libdbus-1-dev libdecor-0-dev

    - name: Build SDL3 from source
      run: |
        git clone --depth 1 --branch release-3.2.14 https://github.com/libsdl-org/SDL.git /tmp/SDL3
        cmake -S /tmp/SDL3 -B /tmp/SDL3/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build /tmp/SDL3/build
        sudo cmake --install /tmp/SDL3/build

    - name: Configure
      run: cmake --preset linux

    - name: Build
      run: cmake --build --preset linux -- -k 0

    - name: Unit tests
      run: ctest --test-dir bld/linux --output-on-failure

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: brew install ninja sdl3

    - name: Configure
      run: cmake --preset macos

    - name: Build
      run: cmake --build --preset macos -- -k 0

    - name: Unit tests
      run: ctest --test-dir bld/macos --output-on-failure

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-SDL3
          mingw-w64-x86_64-opengl
          git

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure
      run: cmake --preset windows

    - name: Build
      run: cmake --build --preset windows -- -k 0

    - name: Unit tests
      run: ctest --test-dir bld/windows --output-on-failure
